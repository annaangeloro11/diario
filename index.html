<title>Il mio diario</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#f5ebe4;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif}
:root{
  --bg:#f5ebe4;
  --bg2:#fdf7f3;
  --bg3:#f0e2d8;
  --bg4:#e8d4c8;
  --surface:#fdf7f3;
  --surface2:#f5ebe4;
  --text:#3a1f28;
  --text2:#7a4a58;
  --text3:#b08090;
  --accent:#8b2042;
  --accent2:#b5436a;
  --accent3:#d4849f;
  --bordeaux:#6b1535;
  --bordeaux2:#8b2042;
  --gold:#a0723a;
  --border:#e0c8d0;
  --border2:#c8a0b0;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;background:var(--bg);color:var(--text);overflow:hidden}

/* HEADER */
.header{
  padding:calc(var(--safe-top) + 10px) 18px 10px;
  background:var(--bg2);
  border-bottom:0.5px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.header-left h1{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-0.5px}
.header-left p{font-size:11px;color:var(--text3);margin-top:1px;font-style:italic}
.icon-btn{
  width:34px;height:34px;border-radius:50%;
  background:var(--bg3);border:0.5px solid var(--border2);
  color:var(--text2);display:flex;align-items:center;justify-content:center;
  font-size:16px;cursor:pointer;flex-shrink:0;
}

/* SCROLL */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* BOTTOM NAV */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  padding:6px 0 calc(6px + var(--safe-bottom));
  background:var(--bg2);border-top:0.5px solid var(--border);
  display:flex;z-index:100;
}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;color:var(--text3);cursor:pointer;padding:4px 0}
.nav-item.active{color:var(--accent2)}
.nav-icon{font-size:20px}

/* CALENDAR */
.cal-wrap{padding:16px 14px calc(80px + var(--safe-bottom))}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding:0 2px}
.cal-month{font-size:20px;font-weight:700;color:var(--text);letter-spacing:-0.3px}
.cal-year{font-size:14px;color:var(--text3);font-weight:400;margin-left:6px}
.cal-arrow{width:32px;height:32px;border-radius:50%;background:var(--bg3);border:0.5px solid var(--border);color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer}
.cal-arrow:active{background:var(--bg4)}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px}
.cal-wd{text-align:center;font-size:11px;color:var(--text3);padding:4px 0;font-weight:500;text-transform:uppercase;letter-spacing:0.5px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day{
  aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  border-radius:10px;cursor:pointer;position:relative;transition:background 0.15s;
  font-size:15px;font-weight:400;color:var(--text2);
}
.cal-day:active{background:var(--bg4)}
.cal-day.other-month{color:var(--text3);opacity:0.4}
.cal-day.today{background:var(--bordeaux2);color:#fdf7f3;font-weight:700}
.cal-day.today:active{background:var(--bordeaux)}
.cal-day.has-entry{color:var(--text);font-weight:600}
.cal-day.selected{background:var(--bg3);border:1px solid var(--accent)}
.cal-dot{width:5px;height:5px;border-radius:50%;background:var(--accent2);margin-top:2px}
.cal-dot.sad{background:var(--text3)}
.cal-dot.happy{background:var(--gold)}

/* QUOTE */
.quote-strip{
  margin:0 14px 14px;
  background:var(--bg2);border:0.5px solid var(--border);border-left:3px solid var(--accent);
  border-radius:10px;padding:12px 14px;
}
.quote-text{font-size:13px;color:var(--text2);font-style:italic;line-height:1.6}
.quote-author{font-size:11px;color:var(--text3);margin-top:4px}

/* MONTH TAG STRIP */
.month-tags-wrap{margin:0 14px 14px}
.month-tags-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:8px}
.month-tags-row{display:flex;gap:6px;flex-wrap:wrap}
.month-tag{
  background:var(--bg3);border:0.5px solid var(--border2);color:var(--text2);
  padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;
}
.month-tag.active{background:rgba(181,67,106,0.25);border-color:var(--accent);color:var(--accent2)}
.month-tag-add{
  background:transparent;border:0.5px dashed var(--border2);color:var(--text3);
  padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;
}
.month-tag-add:active{background:var(--bg3)}

/* ENTRIES LIST BELOW CALENDAR */
.day-entries-header{margin:16px 14px 8px;display:flex;align-items:center;justify-content:space-between}
.day-entries-title{font-size:13px;font-weight:600;color:var(--text);letter-spacing:-0.2px}
.day-write-btn{
  background:var(--bordeaux2);border:none;color:#fdf7f3;
  padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;
}
.day-write-btn:active{background:var(--bordeaux)}
.day-entry-item{
  margin:0 14px 8px;background:var(--bg2);border:0.5px solid var(--border);border-radius:12px;
  padding:12px 14px;cursor:pointer;transition:background 0.15s;
}
.day-entry-item:active{background:var(--bg3)}
.day-entry-time{font-size:11px;color:var(--text3);margin-bottom:4px}
.day-entry-preview{font-size:14px;color:var(--text2);line-height:1.5;
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.day-entry-tags{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
.day-entry-tag{background:rgba(181,67,106,0.15);color:var(--accent2);padding:2px 9px;border-radius:20px;font-size:11px}
.day-empty{margin:0 14px;text-align:center;padding:30px 0;color:var(--text3);font-size:13px;font-style:italic}

/* WRITE / DETAIL PAGE */
.page{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;transform:translateX(100%);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1)}
/* LOCK SCREEN */
#lock-screen{
  position:fixed;inset:0;z-index:9999;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 32px calc(40px + var(--safe-bottom));
}
#lock-screen.hidden{display:none}
.lock-icon{font-size:52px;margin-bottom:8px}
.lock-title{font-size:24px;font-weight:700;color:var(--text);margin-bottom:4px;letter-spacing:-0.5px}
.lock-sub{font-size:13px;color:var(--text3);margin-bottom:40px;font-style:italic}
.pin-display{display:flex;gap:14px;margin-bottom:32px}
.pin-dot{
  width:16px;height:16px;border-radius:50%;
  background:var(--border2);transition:background 0.15s;
}
.pin-dot.filled{background:var(--accent)}
.pin-dot.error{background:var(--danger,#c0392b);animation:shake 0.3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:280px}
.pin-key{
  aspect-ratio:1;border-radius:50%;background:var(--bg2);border:0.5px solid var(--border);
  font-size:22px;font-weight:500;color:var(--text);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background 0.1s;user-select:none;-webkit-user-select:none;
}
.pin-key:active{background:var(--bg4)}
.pin-key.zero{grid-column:2}
.pin-key.del{background:transparent;border-color:transparent;font-size:18px;color:var(--text3)}
.pin-key.del:active{background:var(--bg3)}
.lock-error{font-size:13px;color:#c0392b;margin-top:16px;height:18px;text-align:center}

.page.open{transform:translateX(0)}
.page-header{
  padding:calc(var(--safe-top) + 10px) 16px 10px;
  background:var(--bg2);border-bottom:0.5px solid var(--border);
  display:flex;align-items:center;gap:12px;flex-shrink:0;
}
.page-back{color:var(--accent2);font-size:15px;cursor:pointer;background:none;border:none;padding:4px;display:flex;align-items:center;gap:3px;white-space:nowrap}
.page-back:active{opacity:0.6}
.page-title{flex:1;font-size:16px;font-weight:600;color:var(--text)}
.page-action{color:var(--accent2);font-size:15px;cursor:pointer;background:none;border:none;padding:4px;white-space:nowrap}
.page-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 16px calc(40px + var(--safe-bottom))}

/* PAPER EFFECT */
.paper{
  background:var(--surface);border-radius:16px;padding:20px;
  min-height:260px;position:relative;
}
.paper::before{
  content:'';position:absolute;left:44px;top:0;bottom:0;width:1px;
  background:rgba(181,67,106,0.15);pointer-events:none;
}
.paper-date{font-size:12px;color:var(--accent);margin-bottom:14px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.paper textarea{
  width:100%;background:transparent;border:none;outline:none;resize:none;
  font-size:16px;line-height:2;color:#3a1f28;
  font-family:'Georgia',serif;padding-left:14px;min-height:200px;
}
.paper textarea::placeholder{color:#b08090;font-style:italic}
.char-count{font-size:11px;color:var(--text3);text-align:right;margin-top:6px}

/* MOOD ROW */
.mood-row{display:flex;gap:8px;margin:16px 0;justify-content:space-between}
.mood-btn{
  flex:1;background:var(--bg3);border:0.5px solid var(--border);
  border-radius:12px;padding:10px 4px;text-align:center;cursor:pointer;transition:all 0.15s;
}
.mood-btn.selected{border-color:var(--accent);background:var(--bg4)}
.mood-btn:active{background:var(--bg4)}
.mood-emoji{font-size:22px;display:block;margin-bottom:2px}
.mood-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.4px}
.mood-btn.selected .mood-lbl{color:var(--accent2)}

/* TAGS */
.tags-section{margin:16px 0}
.section-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:8px}
.tags-input-row{display:flex;gap:8px;margin-bottom:8px}
.tags-input-row input{
  flex:1;background:var(--bg3);border:0.5px solid var(--border);color:var(--text);
  border-radius:10px;padding:9px 12px;font-size:14px;outline:none;
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;
  -webkit-appearance:none;
}
.tags-input-row input:focus{border-color:var(--accent)}
.tag-add-btn{
  background:var(--bg3);border:0.5px solid var(--border2);color:var(--text2);
  border-radius:10px;padding:0 14px;font-size:22px;cursor:pointer;display:flex;align-items:center;
}
.tag-add-btn:active{background:var(--bg4)}
.tags-pills{display:flex;flex-wrap:wrap;gap:6px}
.tag-pill{
  background:rgba(181,67,106,0.2);border:0.5px solid var(--accent);color:var(--accent2);
  padding:4px 12px;border-radius:20px;font-size:12px;display:inline-flex;align-items:center;gap:5px;
}
.tag-x{color:var(--accent);cursor:pointer;font-size:15px;line-height:1}

/* BUTTONS */
.btn-full{
  width:100%;padding:15px;border-radius:14px;font-size:16px;font-weight:700;
  cursor:pointer;border:none;margin-bottom:10px;letter-spacing:-0.2px;
}
.btn-save{background:var(--bordeaux2);color:#fdf7f3}
.btn-save:active{background:var(--bordeaux)}
.btn-del{background:rgba(139,32,66,0.08);color:var(--bordeaux);border:0.5px solid var(--bordeaux2)}
.btn-del:active{background:rgba(122,30,58,0.4)}
.divider{border:none;border-top:0.5px solid var(--border);margin:16px 0}

/* MICROFONO */
.mic-bar{display:flex;align-items:center;gap:10px;margin:10px 0 0}
.mic-btn{
  width:46px;height:46px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:22px;
  background:var(--bg3);border:0.5px solid var(--border2);
  flex-shrink:0;transition:all 0.2s;
}
.mic-btn.recording{
  background:var(--bordeaux2);border-color:var(--bordeaux);
  animation:mic-pulse 1.2s ease-in-out infinite;
}
.mic-btn:active{opacity:0.7}
@keyframes mic-pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(139,32,66,0.4)}
  50%{box-shadow:0 0 0 10px rgba(139,32,66,0)}
}
.mic-status{font-size:12px;color:var(--text3);font-style:italic;flex:1}
.mic-status.active{color:var(--accent);font-style:normal;font-weight:500}
.mic-lang-btn{font-size:11px;color:var(--text3);background:var(--bg3);border:0.5px solid var(--border);border-radius:8px;padding:5px 9px;cursor:pointer}
.mic-lang-btn:active{background:var(--bg4)}

/* ARCHIVE PAGE */
.archive-wrap{padding:16px 14px calc(80px + var(--safe-bottom))}
.archive-month-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:12px;cursor:pointer;transition:background 0.15s}
.archive-month-card:active{background:var(--bg3)}
.archive-month-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.archive-month-name{font-size:17px;font-weight:700;color:var(--text)}
.archive-month-count{font-size:12px;color:var(--text3)}
.archive-month-preview{font-size:13px;color:var(--text3);font-style:italic;line-height:1.5;
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;margin-bottom:8px}
.archive-month-tags{display:flex;flex-wrap:wrap;gap:5px}
.archive-month-tag{background:rgba(181,67,106,0.15);color:var(--accent2);padding:2px 9px;border-radius:20px;font-size:11px}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:12px;padding:0 14px}
.search-input{
  width:100%;background:var(--bg3);border:0.5px solid var(--border);color:var(--text);
  border-radius:12px;padding:10px 12px 10px 36px;font-size:15px;outline:none;
  font-family:-apple-system,sans-serif;-webkit-appearance:none;
}
.search-input:focus{border-color:var(--accent)}
.search-icon{position:absolute;left:26px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px;pointer-events:none}

/* STATS */
.stats-wrap{padding:16px 14px calc(80px + var(--safe-bottom))}
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.stat-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:14px;padding:16px 12px;text-align:center}
.stat-num{font-size:28px;font-weight:700;color:var(--accent2)}
.stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-top:3px}
.section-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:12px}
.section-card-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px;font-weight:600}
.mood-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.mood-bar-bg{flex:1;height:7px;background:var(--bg3);border-radius:4px;overflow:hidden}
.mood-bar-fill{height:100%;background:linear-gradient(90deg,var(--bordeaux),var(--accent));border-radius:4px;transition:width 0.5s}
.mood-cnt{font-size:12px;color:var(--text3);min-width:18px;text-align:right}

/* TOAST */
.toast{
  position:fixed;bottom:calc(80px + var(--safe-bottom) + 10px);left:50%;
  transform:translateX(-50%) translateY(8px);
  background:var(--bg4);border:0.5px solid var(--accent);color:var(--text);
  padding:10px 20px;border-radius:20px;font-size:13px;
  opacity:0;transition:all 0.25s;pointer-events:none;z-index:999;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* MONTH TAG MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:300;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity 0.25s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-sheet{background:var(--bg2);border-radius:20px 20px 0 0;padding:20px 18px calc(20px + var(--safe-bottom));width:100%;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1)}
.modal-overlay.open .modal-sheet{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:14px}
.modal-input{width:100%;background:var(--bg3);border:0.5px solid var(--border);color:var(--text);border-radius:12px;padding:12px 14px;font-size:16px;outline:none;-webkit-appearance:none;font-family:-apple-system,sans-serif;margin-bottom:14px}
.modal-input:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:10px}
.modal-btn{flex:1;padding:13px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;border:none}
.modal-btn.primary{background:var(--bordeaux2);color:#fdf7f3}
.modal-btn.secondary{background:var(--bg3);color:var(--text2)}

/* EMPTY */
.empty{text-align:center;padding:50px 20px;color:var(--text3)}
.empty-icon{font-size:44px;margin-bottom:12px}
.empty p{font-size:13px;line-height:1.7;font-style:italic}
</style>
</head>
<body>
<div id="app">
  <div class="header" id="main-header">
    <div class="header-left">
      <h1 id="h-title">Il mio diario</h1>
      <p id="h-sub">Oggi, 19 giugno 2026</p>
    </div>
    <div class="icon-btn" id="h-btn" onclick="openSearch()">🔍</div>
  </div>
  <div class="scroll" id="page-content"></div>
  <nav class="bottom-nav">
    <div class="nav-item active" id="nav-cal" onclick="switchTab('cal')"><div class="nav-icon">📅</div><div>Calendario</div></div>
    <div class="nav-item" id="nav-archive" onclick="switchTab('archive')"><div class="nav-icon">📚</div><div>Archivio</div></div>
    <div class="nav-item" id="nav-stats" onclick="switchTab('stats')"><div class="nav-icon">✨</div><div>Statistiche</div></div>
  </nav>
</div>

<!-- WRITE / DETAIL PAGE -->
<div class="page" id="write-page">
  <div class="page-header">
    <button class="page-back" onclick="closePage('write-page')">‹ Indietro</button>
    <div class="page-title" id="write-title">Nuova voce</div>
    <button class="page-action" id="write-save-btn" onclick="saveEntry()">Salva</button>
  </div>
  <div class="page-scroll" id="write-content"></div>
</div>

<!-- SEARCH PAGE -->
<div class="page" id="search-page">
  <div class="page-header">
    <button class="page-back" onclick="closePage('search-page')">‹ Indietro</button>
    <div class="page-title">Cerca</div>
  </div>
  <div class="page-scroll" id="search-content"></div>
</div>

<!-- MONTH ARCHIVE PAGE -->
<div class="page" id="month-page">
  <div class="page-header">
    <button class="page-back" onclick="closePage('month-page')">‹ Archivio</button>
    <div class="page-title" id="month-page-title">Gennaio</div>
  </div>
  <div class="page-scroll" id="month-content"></div>
</div>

<!-- MONTH TAG MODAL -->
<div class="modal-overlay" id="tag-modal" onclick="closeTagModal(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Aggiungi tag al mese</div>
    <input type="text" class="modal-input" id="modal-tag-input" placeholder="es. Vacanze, Lavoro intenso, Rinascita…" autocomplete="off" autocorrect="off" autocapitalize="none">
    <div class="modal-actions">
      <button class="modal-btn secondary" onclick="closeTagModalBtn()">Annulla</button>
      <button class="modal-btn primary" onclick="addMonthTagFromModal()">Aggiungi</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── DATA ──────────────────────────────────────────────
let entries    = JSON.parse(localStorage.getItem('diario_entries_v2') || '[]');
let monthTags  = JSON.parse(localStorage.getItem('diario_month_tags') || '{}'); // {'2026-06': ['Vacanze',...]}
let calDate    = new Date();
let selectedDay= null;
let editId     = null;
let formState  = {mood:null, tags:[]};
let currentTab = 'cal';
let tagModalMonthKey = null;

const MOODS = [
  {key:'gioiosa', e:'😄', l:'Gioiosa', type:'happy'},
  {key:'serena',  e:'😊', l:'Serena',  type:'happy'},
  {key:'neutro',  e:'😐', l:'Neutro',  type:'neutral'},
  {key:'triste',  e:'😔', l:'Triste',  type:'sad'},
  {key:'ansiosa', e:'😰', l:'Ansiosa', type:'sad'}
];

const QUOTES = [
  {t:'"Scrivere è un modo di ascoltarsi."', a:'— Natalia Ginzburg'},
  {t:'"Il diario è lo specchio dell\'anima che non mente."', a:'— Anais Nin'},
  {t:'"Solo scrivendo si capisce davvero cosa si pensa."', a:'— Joan Didion'},
  {t:'"I diari sono il posto dove vivono i segreti più veri."', a:'— Anne Frank'},
  {t:'"Ogni giorno è un racconto che aspetta di essere scritto."', a:'— Virginia Woolf'},
  {t:'"Scrivere significa restare."', a:'— Marguerite Yourcenar'},
  {t:'"La penna è più fedele della memoria."', a:'— Louise Glück'},
];

const MONTHS_IT = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const DAYS_IT   = ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];

// ── UTILS ────────────────────────────────────────────
function save(){ localStorage.setItem('diario_entries_v2', JSON.stringify(entries)); localStorage.setItem('diario_month_tags', JSON.stringify(monthTags)); }
function esc(s){ return s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function uid(){ return 'e'+Date.now()+Math.random().toString(36).slice(2,5); }
function pad(n){ return String(n).padStart(2,'0'); }
function toKey(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function toMonthKey(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}`; }
function nowLocal(){ const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`; }
function fmtDate(iso){ const d=new Date(iso); return d.toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long',year:'numeric'}); }
function fmtTime(iso){ const d=new Date(iso); return d.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'}); }
function dayKey(iso){ return iso.slice(0,10); }
function calcStreak(){
  if(!entries.length) return 0;
  const days=new Set(entries.map(e=>dayKey(e.date)));
  let s=0; const cur=new Date();
  while(true){ const d=toKey(cur); if(days.has(d)){s++;cur.setDate(cur.getDate()-1);}else break; }
  return s;
}
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }
function getTodayQuote(){ const d=new Date(); return QUOTES[d.getDate()%QUOTES.length]; }
function entriesByDay(key){ return entries.filter(e=>dayKey(e.date)===key); }
function entriesByMonth(mk){ return entries.filter(e=>e.date.slice(0,7)===mk); }

// ── NAV ──────────────────────────────────────────────
function switchTab(tab){
  currentTab=tab;
  ['cal','archive','stats'].forEach(t=>document.getElementById('nav-'+t).classList.toggle('active',t===tab));
  if(tab==='cal') renderCal();
  else if(tab==='archive') renderArchive();
  else renderStats();
}

// ── PAGE OPEN/CLOSE ──────────────────────────────────
function openPage(id){ requestAnimationFrame(()=>document.getElementById(id).classList.add('open')); }
function closePage(id){ document.getElementById(id).classList.remove('open'); }

// ── CALENDAR ─────────────────────────────────────────
function renderCal(){
  document.getElementById('h-title').textContent='Il mio diario';
  const today=new Date(); const todayKey=toKey(today);
  if(!selectedDay) selectedDay=todayKey;
  const year=calDate.getFullYear(), month=calDate.getMonth();
  const first=new Date(year,month,1); const last=new Date(year,month+1,0);
  let startDow=first.getDay(); // 0=dom
  const q=getTodayQuote();
  const mk=`${year}-${pad(month+1)}`;
  const mTags=monthTags[mk]||[];

  // header
  document.getElementById('h-title').textContent='Il mio diario';
  document.getElementById('h-sub').textContent=today.toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('h-btn').textContent='🔍';
  document.getElementById('h-btn').onclick=openSearch;

  let html='<div class="cal-wrap">';

  // quote
  html+=`<div class="quote-strip"><div class="quote-text">${q.t}</div><div class="quote-author">${q.a}</div></div>`;

  // month tags
  html+=`<div class="month-tags-wrap">
    <div class="month-tags-label">Tag di ${MONTHS_IT[month]}</div>
    <div class="month-tags-row">`;
  mTags.forEach(t=>html+=`<span class="month-tag active">${esc(t)} <span style="opacity:0.5;cursor:pointer" onclick="removeMonthTag('${mk}','${esc(t)}')">×</span></span>`);
  html+=`<span class="month-tag-add" onclick="openTagModal('${mk}')">＋ Tag</span>`;
  html+='</div></div>';

  // cal nav
  html+=`<div class="cal-nav">
    <div class="cal-arrow" onclick="prevMonth()">‹</div>
    <div><span class="cal-month">${MONTHS_IT[month]}</span><span class="cal-year">${year}</span></div>
    <div class="cal-arrow" onclick="nextMonth()">›</div>
  </div>`;

  // weekdays
  html+='<div class="cal-weekdays">';
  DAYS_IT.forEach(d=>html+=`<div class="cal-wd">${d}</div>`);
  html+='</div><div class="cal-grid">';

  // prev month padding
  for(let i=0;i<startDow;i++){
    const d=new Date(year,month,1-startDow+i);
    html+=`<div class="cal-day other-month">${d.getDate()}</div>`;
  }
  // days
  for(let d=1;d<=last.getDate();d++){
    const key=`${year}-${pad(month+1)}-${pad(d)}`;
    const dayEntries=entriesByDay(key);
    const isToday=key===todayKey;
    const isSel=key===selectedDay;
    const hasMood=dayEntries.find(e=>e.mood);
    const moodType=hasMood?MOODS.find(m=>m.key===hasMood.mood)?.type:'';
    let cls='cal-day';
    if(isToday) cls+=' today';
    if(isSel && !isToday) cls+=' selected';
    if(dayEntries.length) cls+=' has-entry';
    let dot=dayEntries.length?`<div class="cal-dot${moodType==='sad'?' sad':moodType==='happy'?' happy':''}"></div>`:'';
    html+=`<div class="${cls}" onclick="selectDay('${key}')">${d}${dot}</div>`;
  }

  // trailing
  const remaining=(7-((startDow+last.getDate())%7))%7;
  for(let i=1;i<=remaining;i++) html+=`<div class="cal-day other-month">${i}</div>`;
  html+='</div>';

  // selected day entries
  const selEntries=entriesByDay(selectedDay).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const selDate=new Date(selectedDay+'T12:00:00');
  const selLabel=selDate.toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long'});

  html+=`<div class="day-entries-header">
    <div class="day-entries-title">${selLabel}</div>
    <button class="day-write-btn" onclick="openWrite(null,'${selectedDay}')">✍️ Scrivi</button>
  </div>`;

  if(!selEntries.length){
    html+=`<div class="day-empty">Nessuna voce per questo giorno.<br>Vuoi scrivere qualcosa?</div>`;
  } else {
    selEntries.forEach(e=>{
      const mo=MOODS.find(m=>m.key===e.mood);
      const prev=e.text.length>90?e.text.slice(0,90)+'…':e.text;
      html+=`<div class="day-entry-item" onclick="openWrite('${e.id}')">
        <div class="day-entry-time">${fmtTime(e.date)}${mo?' · '+mo.e+' '+mo.l:''}</div>
        <div class="day-entry-preview">${esc(prev)}</div>
        ${e.tags&&e.tags.length?`<div class="day-entry-tags">${e.tags.map(t=>`<span class="day-entry-tag">#${esc(t)}</span>`).join('')}</div>`:''}
      </div>`;
    });
  }

  html+='</div>';
  document.getElementById('page-content').innerHTML=html;
}

function selectDay(key){ selectedDay=key; renderCal(); }
function prevMonth(){ calDate=new Date(calDate.getFullYear(),calDate.getMonth()-1,1); renderCal(); }

function closeTagModal(e){ if(e.target===document.getElementById('tag-modal')) closeTagModalBtn(); }
function closeTagModalBtn(){ document.getElementById('tag-modal').classList.remove('open'); }
function addMonthTagFromModal(){

// ── WRITE ─────────────────────────────────────────────
function openWrite(id=null, dayOverride=null){
  editId=id;
  const entry=id?entries.find(e=>e.id===id):null;
  formState=entry?{mood:entry.mood||null,tags:[...(entry.tags||[])]}:{mood:null,tags:[]};
  document.getElementById('write-title').textContent=entry?'Modifica voce':'Nuova voce';

  const dateVal=entry?entry.date.slice(0,16):(dayOverride?dayOverride+'T'+new Date().toTimeString().slice(0,5):nowLocal());

  let moodHtml='<div class="mood-row">';
  MOODS.forEach(m=>moodHtml+=`<div class="mood-btn${formState.mood===m.key?' selected':''}" id="mood-${m.key}" onclick="selectMood('${m.key}')"><span class="mood-emoji">${m.e}</span><span class="mood-lbl">${m.l}</span></div>`);
  moodHtml+='</div>';

  document.getElementById('write-content').innerHTML=`
    <div class="paper">
      <div class="paper-date" id="paper-date-label">${fmtDateFromVal(dateVal)}</div>
      <textarea id="f-text" placeholder="Scrivi il tuo pensiero di oggi…" oninput="updateChar()" rows="10">${entry?esc(entry.text):''}</textarea>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px">
      <div class="char-count" id="char-count" style="margin:0">${entry?entry.text.length:0} caratteri</div>
    </div>

    <div class="mic-bar">
      <button class="mic-btn" id="mic-btn" onclick="toggleMic()" title="Registra voce">🎙️</button>
      <div class="mic-status" id="mic-status">Tocca il microfono per dettare</div>
      <button class="mic-lang-btn" id="mic-lang" onclick="cycleLang()">🇮🇹 IT</button>
    </div>

    <div style="margin:20px 0 8px">
      <div class="section-label">Come ti sei sentita oggi?</div>
      ${moodHtml}
    </div>

    <div class="tags-section">
      <div class="section-label">Tag</div>
      <div class="tags-input-row">
        <input type="text" id="f-tag" placeholder="Aggiungi un tag…" onkeydown="tagKD(event)" autocomplete="off" autocorrect="off" autocapitalize="none">
        <button class="tag-add-btn" onclick="addTag()">＋</button>
      </div>
      <div class="tags-pills" id="tag-pills">${renderPills()}</div>
    </div>

    <input type="hidden" id="f-date" value="${dateVal}">

    <div class="divider"></div>
    <button class="btn-full btn-save" onclick="saveEntry()">💾 Salva voce</button>
    ${entry?`<button class="btn-full btn-del" onclick="deleteEntry('${entry.id}')">🗑 Elimina voce</button>`:''}
    <div style="height:20px"></div>
  `;
  openPage('write-page');
  initMic();
  setTimeout(()=>document.getElementById('f-text').focus(),350);
}

function fmtDateFromVal(v){
  try{ const d=new Date(v); return d.toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long',year:'numeric'}); }catch(e){ return v; }
}
function updateChar(){ const el=document.getElementById('char-count'); if(el) el.textContent=(document.getElementById('f-text').value.length)+' caratteri'; }
function selectMood(k){
  formState.mood=formState.mood===k?null:k;
  MOODS.forEach(m=>{ const el=document.getElementById('mood-'+m.key); if(el) el.classList.toggle('selected',m.key===formState.mood); });
}
function tagKD(e){ if(e.key==='Enter'){e.preventDefault();addTag();} }
function addTag(){
  const inp=document.getElementById('f-tag');
  const v=inp.value.trim().toLowerCase().replace(/[^\w\-àèìòùéáíóú]/g,'');
  if(v&&!formState.tags.includes(v)) formState.tags.push(v);
  inp.value=''; refreshPills(); inp.focus();
}
function removeTag(t){ formState.tags=formState.tags.filter(x=>x!==t); refreshPills(); }
function renderPills(){ return formState.tags.map(t=>`<span class="tag-pill">#${esc(t)}<span class="tag-x" onclick="removeTag('${esc(t)}')">×</span></span>`).join(''); }
function refreshPills(){ const el=document.getElementById('tag-pills'); if(el) el.innerHTML=renderPills(); }

function saveEntry(){
  const text=document.getElementById('f-text').value.trim();
  const date=document.getElementById('f-date').value;
  if(!text){toast('Scrivi qualcosa prima di salvare!');return;}
  if(editId){
    const idx=entries.findIndex(e=>e.id===editId);
    if(idx>=0) entries[idx]={...entries[idx],text,date,mood:formState.mood,tags:[...formState.tags]};
    toast('Voce aggiornata ✓');
  } else {
    entries.push({id:uid(),date:date||new Date().toISOString(),text,mood:formState.mood,tags:[...formState.tags]});
    toast('Voce salvata ✓');
  }
  save(); closePage('write-page');
  selectedDay=date?date.slice(0,10):toKey(new Date());
  if(currentTab==='cal') setTimeout(renderCal,320);
  else if(currentTab==='archive') setTimeout(renderArchive,320);
}

function deleteEntry(id){
  if(!confirm('Eliminare questa voce?')) return;
  entries=entries.filter(e=>e.id!==id);
  save(); toast('Voce eliminata'); closePage('write-page');
  setTimeout(()=>{ if(currentTab==='cal') renderCal(); else renderArchive(); },320);
}

// ── ARCHIVE ───────────────────────────────────────────
function renderArchive(){
  document.getElementById('h-title').textContent='Archivio';
  document.getElementById('h-sub').textContent='Tutti i mesi';
  document.getElementById('h-btn').textContent='🔍';
  document.getElementById('h-btn').onclick=openSearch;

  // group by month
  const byMonth={};
  entries.forEach(e=>{
    const mk=e.date.slice(0,7);
    if(!byMonth[mk]) byMonth[mk]=[];
    byMonth[mk].push(e);
  });
  const sortedMonths=Object.keys(byMonth).sort().reverse();

  if(!sortedMonths.length){
    document.getElementById('page-content').innerHTML=`<div class="archive-wrap"><div class="empty"><div class="empty-icon">🌹</div><p>Nessuna voce ancora.<br>Inizia a scrivere dal calendario.</p></div></div>`;
    return;
  }

  let html='<div class="archive-wrap">';
  sortedMonths.forEach(mk=>{
    const [y,m]=mk.split('-');
    const label=`${MONTHS_IT[parseInt(m)-1]} ${y}`;
    const mes=byMonth[mk].sort((a,b)=>new Date(b.date)-new Date(a.date));
    const firstText=mes[0].text;
    const prev=firstText.length>60?firstText.slice(0,60)+'…':firstText;
    const tags=monthTags[mk]||[];
    html+=`<div class="archive-month-card" onclick="openMonthPage('${mk}')">
      <div class="archive-month-header">
        <div class="archive-month-name">${label}</div>
        <div class="archive-month-count">${mes.length} ${mes.length===1?'voce':'voci'}</div>
      </div>
      <div class="archive-month-preview">${esc(prev)}</div>
      ${tags.length?`<div class="archive-month-tags">${tags.map(t=>`<span class="archive-month-tag">${esc(t)}</span>`).join('')}<span class="archive-month-tag" style="background:transparent;border:0.5px dashed var(--border2);color:var(--text3)" onclick="event.stopPropagation();openTagModal('${mk}')">＋</span></div>`
      :`<div><span class="archive-month-tag" style="background:transparent;border:0.5px dashed var(--border2);color:var(--text3)" onclick="event.stopPropagation();openTagModal('${mk}')">＋ Tag mese</span></div>`}
    </div>`;
  });
  html+='</div>';
  document.getElementById('page-content').innerHTML=html;
}

function openMonthPage(mk){
  const [y,m]=mk.split('-');
  const label=`${MONTHS_IT[parseInt(m)-1]} ${y}`;
  document.getElementById('month-page-title').textContent=label;
  const mes=entriesByMonth(mk).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const tags=monthTags[mk]||[];
  let html='';
  if(tags.length){
    html+=`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px">`;
    tags.forEach(t=>html+=`<span class="tag-pill">${esc(t)}</span>`);
    html+=`<span class="month-tag-add" onclick="openTagModal('${mk}')">＋ Tag</span></div>`;
  } else {
    html+=`<div style="margin-bottom:16px"><span class="month-tag-add" onclick="openTagModal('${mk}')">＋ Aggiungi tag al mese</span></div>`;
  }
  mes.forEach(e=>{
    const mo=MOODS.find(m=>m.key===e.mood);
    const prev=e.text.length>120?e.text.slice(0,120)+'…':e.text;
    html+=`<div class="day-entry-item" onclick="openWrite('${e.id}')">
      <div class="day-entry-time">${fmtDate(e.date)} · ${fmtTime(e.date)}${mo?' · '+mo.e:''}
      </div>
      <div class="day-entry-preview">${esc(prev)}</div>
      ${e.tags&&e.tags.length?`<div class="day-entry-tags">${e.tags.map(t=>`<span class="day-entry-tag">#${esc(t)}</span>`).join('')}</div>`:''}
    </div>`;
  });
  document.getElementById('month-content').innerHTML=html;
  openPage('month-page');
}

// ── SEARCH ────────────────────────────────────────────
function openSearch(){
  document.getElementById('search-content').innerHTML=`
    <div class="search-wrap" style="padding-top:4px">
      <div class="search-icon">🔍</div>
      <input type="text" class="search-input" id="search-inp" placeholder="Cerca nelle voci…" oninput="doSearch(this.value)" autofocus autocomplete="off" autocorrect="off">
    </div>
    <div id="search-results" style="padding:0 14px"></div>
  `;
  openPage('search-page');
  setTimeout(()=>document.getElementById('search-inp')?.focus(),350);
}

function doSearch(q){
  const res=document.getElementById('search-results');
  if(!q.trim()){res.innerHTML='';return;}
  const found=entries.filter(e=>
    e.text.toLowerCase().includes(q.toLowerCase())||
    (e.tags&&e.tags.some(t=>t.toLowerCase().includes(q.toLowerCase())))
  ).sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(!found.length){res.innerHTML=`<div class="empty" style="padding:30px 0"><p>Nessuna voce trovata.</p></div>`;return;}
  let html='';
  found.forEach(e=>{
    const mo=MOODS.find(m=>m.key===e.mood);
    const prev=e.text.length>100?e.text.slice(0,100)+'…':e.text;
    html+=`<div class="day-entry-item" onclick="openWrite('${e.id}')">
      <div class="day-entry-time">${fmtDate(e.date)}${mo?' · '+mo.e:''}</div>
      <div class="day-entry-preview">${esc(prev)}</div>
      ${e.tags&&e.tags.length?`<div class="day-entry-tags">${e.tags.map(t=>`<span class="day-entry-tag">#${esc(t)}</span>`).join('')}</div>`:''}
    </div>`;
  });
  res.innerHTML=html;
}

// ── STATS ─────────────────────────────────────────────
function renderStats(){
  document.getElementById('h-title').textContent='Statistiche';
  document.getElementById('h-sub').textContent='Il tuo percorso';
  document.getElementById('h-btn').textContent='';
  document.getElementById('h-btn').onclick=null;

  if(!entries.length){
    document.getElementById('page-content').innerHTML=`<div class="stats-wrap"><div class="empty"><div class="empty-icon">✨</div><p>Nessuna voce ancora.<br>Inizia a scrivere per vedere le tue statistiche.</p></div></div>`;
    return;
  }

  const totalChars=entries.reduce((a,e)=>a+e.text.length,0);
  const avgChars=Math.round(totalChars/entries.length);
  const streak=calcStreak();

  const mc={};MOODS.forEach(m=>mc[m.key]=0);
  entries.forEach(e=>{if(e.mood) mc[e.mood]=(mc[e.mood]||0)+1;});
  const maxM=Math.max(...Object.values(mc),1);

  const tf={};entries.forEach(e=>e.tags&&e.tags.forEach(t=>tf[t]=(tf[t]||0)+1));
  const topTags=Object.entries(tf).sort((a,b)=>b[1]-a[1]).slice(0,8);

  const topMoodKey=MOODS.map(m=>({k:m.key,c:mc[m.key]})).sort((a,b)=>b.c-a.c)[0];
  const topMoodObj=MOODS.find(m=>m.key===topMoodKey.k);
  const byMonth={}; entries.forEach(e=>{const mk=e.date.slice(0,7);byMonth[mk]=(byMonth[mk]||0)+1;});
  const bestMonthKey=Object.entries(byMonth).sort((a,b)=>b[1]-a[1])[0];
  const [bmy,bmm]=bestMonthKey[0].split('-');
  const bestMonth=`${MONTHS_IT[parseInt(bmm)-1]} ${bmy}`;

  let html=`<div class="stats-wrap">
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-num">${entries.length}</div><div class="stat-lbl">Voci scritte</div></div>
      <div class="stat-card"><div class="stat-num">${streak}</div><div class="stat-lbl">Giorni di fila</div></div>
      <div class="stat-card"><div class="stat-num">${avgChars}</div><div class="stat-lbl">Caratteri medi</div></div>
      <div class="stat-card"><div class="stat-num">${Object.keys(byMonth).length}</div><div class="stat-lbl">Mesi scritti</div></div>
    </div>`;

  if(topMoodObj&&topMoodKey.c>0){
    html+=`<div class="section-card" style="text-align:center;padding:20px">
      <div style="font-size:32px;margin-bottom:6px">${topMoodObj.e}</div>
      <div style="font-size:14px;color:var(--text2)">Il tuo umore prevalente: <strong>${topMoodObj.l}</strong></div>
      <div style="font-size:12px;color:var(--text3);margin-top:4px">Mese più prolifico: ${bestMonth}</div>
    </div>`;
  }

  html+=`<div class="section-card"><div class="section-card-title">Distribuzione umore</div>`;
  MOODS.forEach(m=>{
    const cnt=mc[m.key]||0;
    const pct=Math.round((cnt/maxM)*100);
    html+=`<div class="mood-bar-row"><span style="width:72px;font-size:13px">${m.e} ${m.l}</span><div class="mood-bar-bg"><div class="mood-bar-fill" style="width:${pct}%"></div></div><span class="mood-cnt">${cnt}</span></div>`;
  });
  html+='</div>';

  if(topTags.length){
    html+=`<div class="section-card"><div class="section-card-title">Tag più usati</div><div class="tags-pills">`;
    topTags.forEach(([t,c])=>html+=`<span class="tag-pill">#${esc(t)} <span style="opacity:0.55;font-size:11px">${c}</span></span>`);
    html+='</div></div>';
  }

  html+='<div style="height:20px"></div></div>';
  document.getElementById('page-content').innerHTML=html;
}


// ── MICROFONO (Web Speech API) ────────────────────────
let recognition = null;
let isRecording = false;
const MIC_LANGS = [
  {code:'it-IT', label:'🇮🇹 IT'},
  {code:'en-US', label:'🇺🇸 EN'},
  {code:'fr-FR', label:'🇫🇷 FR'},
  {code:'es-ES', label:'🇪🇸 ES'},
];
let micLangIdx = 0;

function initMic(){
  isRecording = false;
  if(recognition){ try{ recognition.abort(); }catch(e){} recognition=null; }
}

function cycleLang(){
  if(isRecording) stopMic();
  micLangIdx = (micLangIdx+1) % MIC_LANGS.length;
  const btn = document.getElementById('mic-lang');
  if(btn) btn.textContent = MIC_LANGS[micLangIdx].label;
}

function toggleMic(){
  if(!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)){
    toast('Il tuo browser non supporta la dettatura. Usa Safari su iPhone.');
    return;
  }
  if(isRecording) stopMic();
  else startMic();
}

function startMic(){
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.lang = MIC_LANGS[micLangIdx].code;
  recognition.continuous = true;
  recognition.interimResults = true;

  const textarea = document.getElementById('f-text');
  const micBtn = document.getElementById('mic-btn');
  const micStatus = document.getElementById('mic-status');
  let baseText = textarea ? textarea.value : '';
  let interimSpan = '';

  recognition.onstart = () => {
    isRecording = true;
    if(micBtn){ micBtn.classList.add('recording'); micBtn.textContent='⏹'; }
    if(micStatus){ micStatus.textContent='In ascolto…'; micStatus.classList.add('active'); }
  };

  recognition.onresult = (e) => {
    let interim = '';
    let finalPart = '';
    for(let i = e.resultIndex; i < e.results.length; i++){
      if(e.results[i].isFinal){
        finalPart += e.results[i][0].transcript;
      } else {
        interim += e.results[i][0].transcript;
      }
    }
    if(finalPart){
      baseText = baseText + (baseText && !baseText.endsWith(' ') ? ' ' : '') + finalPart;
    }
    if(textarea){
      textarea.value = baseText + (interim ? ' ' + interim : '');
      updateChar();
    }
    if(micStatus && interim){
      micStatus.textContent = '🎙 ' + interim.slice(-40);
    }
  };

  recognition.onerror = (e) => {
    let msg = 'Errore microfono';
    if(e.error === 'not-allowed') msg = 'Permesso microfono negato. Controlla le impostazioni Safari.';
    else if(e.error === 'no-speech') msg = 'Nessun suono rilevato. Riprova.';
    else if(e.error === 'network') msg = 'Errore di rete. Controlla la connessione.';
    toast(msg);
    stopMic();
  };

  recognition.onend = () => {
    if(isRecording){
      // Riavvia automaticamente se ancora in modalità registrazione
      try{ recognition.start(); }catch(e){ stopMic(); }
    }
  };

  try{ recognition.start(); }
  catch(e){ toast('Impossibile avviare il microfono.'); isRecording=false; }
}

function stopMic(){
  isRecording = false;
  if(recognition){ try{ recognition.stop(); }catch(e){} recognition=null; }
  const micBtn = document.getElementById('mic-btn');
  const micStatus = document.getElementById('mic-status');
  if(micBtn){ micBtn.classList.remove('recording'); micBtn.textContent='🎙️'; }
  if(micStatus){ micStatus.textContent='Tocca il microfono per dettare'; micStatus.classList.remove('active'); }
}


// ── LOCK SCREEN ───────────────────────────────────────
const PIN_HASH = '4d66e0b01acbbcbcb5a97f3d49d25729'; // MD5 di "1929"
let pinEntry = '';
let pinLocked = true;

function simpleHash(s){
  // djb2 come fallback leggero — usiamo confronto diretto con offuscamento
  return btoa(s).split('').reverse().join('');
}

function pinKey(k){
  if(pinEntry.length >= 4) return;
  pinEntry += k;
  updateDots();
  if(pinEntry.length === 4) setTimeout(checkPin, 120);
}

function pinDel(){
  pinEntry = pinEntry.slice(0,-1);
  updateDots();
  document.getElementById('lock-error').textContent = '';
}

function updateDots(){
  for(let i=0;i<4;i++){
    const d = document.getElementById('d'+i);
    d.classList.toggle('filled', i < pinEntry.length);
    d.classList.remove('error');
  }
}

function checkPin(){
  // confronto offuscato
  const correct = atob('MTkyOQ=='); // base64 di "1929"
  if(pinEntry === correct){
    document.getElementById('lock-screen').classList.add('hidden');
    pinLocked = false;
    // Salva sessione per 8 ore
    sessionStorage.setItem('diario_unlocked', Date.now());
  } else {
    for(let i=0;i<4;i++) document.getElementById('d'+i).classList.add('error');
    document.getElementById('lock-error').textContent = 'Codice errato. Riprova.';
    setTimeout(()=>{
      pinEntry='';
      updateDots();
    }, 700);
  }
}

function checkSession(){
  const t = sessionStorage.getItem('diario_unlocked');
  if(t && Date.now() - parseInt(t) < 8*60*60*1000){
    document.getElementById('lock-screen').classList.add('hidden');
    pinLocked = false;
    return true;
  }
  return false;
}

// ── INIT ──────────────────────────────────────────────
